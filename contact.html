<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Australian Fauna | Contact</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="main-nav">
    <hgroup>
      <h1>Australian Fauna</h1>
      <p>Discover the unique and diverse wildlife of Australia.</p>
    </hgroup>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="about.html">About</a></li>
        <li><a>Contact</a></li>
      </ul>
    </nav>
  </header>
  <main>

    <form id="contact-form" method="post">
      <label for="fname">First Name:</label>
      <input type="text" id="fname" name="fname" autocomplete="given-name">
      <label for="lname">Last Name:</label>
      <input type="text" id="lname" name="lname" autocomplete="family-name">
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" autocomplete="email">
      <label for="mobile">Mobile:</label>
      <input type="tel" id="mobile" name="mobile" autocomplete="tel">

      <label for="message">Message:</label>
      <textarea id="message" name="message" rows="5"></textarea>
      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </form>
  </main>
  <footer>
    <p>Australian Fauna &copy; 2026 by Graham Pyne is licensed under 
      <a href="https://creativecommons.org/publicdomain/zero/1.0/">CC0 1.0</a></p>
  </footer>
</body>

</html>
